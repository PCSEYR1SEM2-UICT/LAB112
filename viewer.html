<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="icons/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>PDF Viewer — LAB 112</title>
  <style>
    :root {
      --navy: #0a1628;
      --amber: #f0a500;
      --cream: #f5ede0;
      --teal-light: #14b8a6;
      --text-dim: #8899aa;
      --card-bg: rgba(17,34,64,0.85);
      --border: rgba(240,165,0,0.2);
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'Inter', sans-serif;
      --navbar-h: 52px;
      --toolbar-h: 52px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Full screen layout — no scrolling on body */
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--navy);
      color: var(--cream);
      font-family: var(--font-body);
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--navbar-h);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      background: rgba(10,22,40,0.98);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 2px;
      text-decoration: none;
    }
    .nav-logo span { color: var(--cream); font-weight: 400; }
    .nav-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed;
      top: var(--navbar-h);
      left: 0; right: 0;
      height: var(--toolbar-h);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.75rem;
      background: rgba(10,22,40,0.98);
      border-bottom: 1px solid var(--border);
      gap: 0.5rem;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
      flex: 1;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(240,165,0,0.1);
      border: 1px solid rgba(240,165,0,0.3);
      color: var(--amber);
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      font-size: 0.75rem;
      font-family: var(--font-display);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pdf-title {
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--cream);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tool-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--cream);
      width: 32px;
      height: 32px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .tool-btn:hover { border-color: rgba(240,165,0,0.5); color: var(--amber); }
    .tool-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
    .page-info {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      white-space: nowrap;
      padding: 0 0.15rem;
      min-width: 42px;
      text-align: center;
    }
    .save-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(20,184,166,0.1);
      border: 1px solid rgba(20,184,166,0.3);
      color: var(--teal-light);
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      font-size: 0.75rem;
      font-family: var(--font-display);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    /* ── VIEWER ──
       Sits below navbar + toolbar.
       Scrolls vertically only.
       Never scrolls horizontally.
    */
    .viewer-wrap {
      position: fixed;
      top: calc(var(--navbar-h) + var(--toolbar-h));
      left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* The canvas sits inside this — we give it padding so the page
       doesn't touch the edges, and limit its max-width to the viewport */
    .canvas-container {
      padding: 1rem 0.5rem 2rem;
      width: 100%;
      display: flex;
      justify-content: center;
      display: none;
    }

    /* CRITICAL: canvas must never exceed viewport width */
    #pdf-canvas {
      display: block;
      max-width: 100%;
      height: auto !important;
      box-shadow: 0 4px 32px rgba(0,0,0,0.7);
    }

    /* ── STATES ── */
    .center-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 2rem;
      text-align: center;
      width: 100%;
    }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-icon { font-size: 2rem; }
    .state-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--cream);
    }
    .state-sub {
      font-size: 0.82rem;
      color: var(--text-dim);
      max-width: 280px;
      line-height: 1.7;
    }

    @media (max-width: 400px) {
      .nav-label { display: none; }
      .save-btn span { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="PDFs.html" class="nav-logo">LAB<span>112</span></a>
    <span class="nav-label">PDF Viewer</span>
  </nav>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <a href="PDFs.html" class="back-btn"><i class="bi bi-arrow-left"></i> Back</a>
      <div class="pdf-title" id="pdf-title">Loading...</div>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn" id="prev-btn" onclick="changePage(-1)" title="Previous" disabled>
        <i class="bi bi-chevron-up"></i>
      </button>
      <span class="page-info" id="page-info">— / —</span>
      <button class="tool-btn" id="next-btn" onclick="changePage(1)" title="Next" disabled>
        <i class="bi bi-chevron-down"></i>
      </button>
      <button class="tool-btn" onclick="zoomOut()" title="Zoom out"><i class="bi bi-zoom-out"></i></button>
      <button class="tool-btn" onclick="zoomIn()" title="Zoom in"><i class="bi bi-zoom-in"></i></button>
      <a href="#" id="save-btn" class="save-btn" download>
        <i class="bi bi-download"></i> <span>Save</span>
      </a>
    </div>
  </div>

  <!-- VIEWER AREA -->
  <div class="viewer-wrap" id="viewer-wrap">

    <div class="center-state" id="loading-state">
      <i class="bi bi-arrow-repeat spin state-icon" style="color:var(--amber);"></i>
      <div class="state-title">Loading PDF...</div>
      <div class="state-sub">Please wait while the document loads.</div>
    </div>

    <div class="center-state" id="error-state" style="display:none;">
      <i class="bi bi-exclamation-circle state-icon" style="color:#fb7185;"></i>
      <div class="state-title">Could not load PDF</div>
      <div class="state-sub">
        This file may not be uploaded to GitHub yet, or the filename doesn't match exactly.
        Try saving it instead.
      </div>
      <a href="#" id="error-dl" class="back-btn" download style="margin-top:0.5rem;">
        <i class="bi bi-download"></i> Try downloading instead
      </a>
    </div>

    <div class="canvas-container" id="canvas-container">
      <canvas id="pdf-canvas"></canvas>
    </div>

  </div>

  <!-- PDF.js -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    // ── State ──
    const params  = new URLSearchParams(window.location.search);
    const fileParam = params.get('file');
    let pdfDoc      = null;
    let currentPage = 1;
    let totalPages  = 0;
    let isRendering = false;
    let userScale   = 1.0; // user zoom multiplier — 1 = fit to width

    // ── Init ──
    if (!fileParam) {
      showError();
    } else {
      const raw = decodeURIComponent(fileParam);
      const fileName = raw.split('/').pop().replace(/\.pdf$/i, '');
      document.getElementById('pdf-title').textContent = fileName;
      document.title = fileName + ' — LAB 112';
      document.getElementById('save-btn').href = fileParam;
      document.getElementById('error-dl').href  = fileParam;
      loadPDF(fileParam);
    }

    // ── Load PDF ──
    async function loadPDF(url) {
      try {
        pdfDoc     = await pdfjsLib.getDocument(url).promise;
        totalPages = pdfDoc.numPages;
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('canvas-container').style.display = 'flex';
        document.getElementById('next-btn').disabled = totalPages <= 1;
        updatePageInfo();
        await renderPage(currentPage);
      } catch (err) {
        console.error('PDF load error:', err);
        showError();
      }
    }

    // ── Render one page ──
    async function renderPage(num) {
      if (isRendering) return;
      isRendering = true;

      try {
        const page = await pdfDoc.getPage(num);

        // Available width = window width minus a little padding (16px each side)
        const availableWidth = window.innerWidth - 32;

        // Get natural page size at scale 1
        const naturalViewport = page.getViewport({ scale: 1 });

        // Scale to fit width, then apply user zoom
        const fitScale   = availableWidth / naturalViewport.width;
        const finalScale = fitScale * userScale;

        const viewport = page.getViewport({ scale: finalScale });

        const canvas = document.getElementById('pdf-canvas');
        const ctx    = canvas.getContext('2d');

        // Device pixel ratio for sharp rendering on high-DPI screens (phones)
        const dpr = Math.min(window.devicePixelRatio || 1, 2); // cap at 2 to avoid memory issues

        canvas.width  = Math.floor(viewport.width  * dpr);
        canvas.height = Math.floor(viewport.height * dpr);
        canvas.style.width  = Math.floor(viewport.width)  + 'px';
        canvas.style.height = Math.floor(viewport.height) + 'px';

        // Reset and scale context for DPR
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        await page.render({ canvasContext: ctx, viewport }).promise;

        // Scroll back to top on page change
        document.getElementById('viewer-wrap').scrollTop = 0;

        updatePageInfo();
        updateButtons();

      } catch (err) {
        console.error('Render error:', err);
      }

      isRendering = false;
    }

    // ── Navigation ──
    async function changePage(delta) {
      const target = currentPage + delta;
      if (target < 1 || target > totalPages) return;
      currentPage = target;
      await renderPage(currentPage);
    }

    // ── Zoom ──
    function zoomIn() {
      if (userScale >= 3.0) return;
      userScale = Math.round((userScale + 0.25) * 100) / 100;
      renderPage(currentPage);
    }
    function zoomOut() {
      if (userScale <= 0.5) return;
      userScale = Math.round((userScale - 0.25) * 100) / 100;
      renderPage(currentPage);
    }

    // ── UI helpers ──
    function updatePageInfo() {
      document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
    }
    function updateButtons() {
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }
    function showError() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('canvas-container').style.display = 'none';
      document.getElementById('error-state').style.display = 'flex';
      document.getElementById('pdf-title').textContent = 'Error';
    }

    // ── Keyboard navigation ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') changePage(1);
      if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  changePage(-1);
    });

    // ── Re-render on resize (orientation change on phone) ──
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (pdfDoc) renderPage(currentPage);
      }, 300);
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
